services:
  - type: web
    name: pathpilot-backend
    env: python
    pythonVersion: python-3.11
    region: Oregon
    buildCommand: pip install -r requirements_production.txt --no-cache-dir
    startCommand: python -c "from app_production import app; app.run(host='0.0.0.0', port=\$PORT)"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: USE_FALLBACK_AI
        value: "true"
      - key: DATA_STORE_TYPE
        value: memory
      - key: PYTHONUNBUFFERED
        value: "1"
    autoDeploy: true

