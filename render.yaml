services:
  - type: web
    name: pathpilot-backend
    env: python
    pythonVersion: python-3.11
    region: Oregon
    rootDir: backend
    buildCommand: pip install -r requirements_render.txt
    startCommand: gunicorn main:app --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./pathpilot.db
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: WEB_CONCURRENCY
        value: "1"
    autoDeploy: true
