services:
  - type: web
    name: pathpilot-backend
    env: python
    pythonVersion: python-3.11
    region: Oregon
    rootDir: backend
    buildCommand: pip install -r requirements_render.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./pathpilot.db
      - key: PYTHONUNBUFFERED
        value: "1"
    autoDeploy: true
