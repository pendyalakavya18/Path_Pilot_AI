{% extends "base.html" %}

{% block content %}
<div class="container mx-auto px-6 py-8">
    <h1 class="text-3xl font-bold mb-8 text-gray-800">Practice Test</h1>

    <div id="setupSection" class="bg-white p-8 rounded-lg shadow-lg max-w-2xl mx-auto">
        <h2 class="text-xl font-bold mb-6 text-gray-800">Start a New Test</h2>

        <div class="mb-6">
            <label class="block text-gray-700 font-semibold mb-2">Topic</label>
            <input type="text" id="topic"
                class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600"
                placeholder="e.g., Python, Algorithms, System Design">
        </div>

        <div class="mb-6">
            <label class="block text-gray-700 font-semibold mb-2">Number of Questions</label>
            <select id="numQuestions"
                class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600">
                <option value="5">5 Questions</option>
                <option value="10">10 Questions</option>
                <option value="15">15 Questions</option>
            </select>
        </div>

        <button id="startTestBtn"
            class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition">Generate
            Test</button>

        <div id="loading" class="hidden mt-6 text-center">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
            <p class="mt-4 text-gray-600">Generating questions...</p>
        </div>
    </div>

    <div id="testSection" class="hidden">
        <div class="bg-white p-8 rounded-lg shadow-lg max-w-3xl mx-auto">
            <div class="mb-6">
                <h2 class="text-xl font-bold text-gray-800" id="testTopic"></h2>
                <p class="text-gray-600">Question <span id="currentQuestion">1</span> of <span
                        id="totalQuestions">5</span></p>
            </div>

            <div id="questionContainer" class="mb-6">
                <h3 class="text-lg font-semibold text-gray-800 mb-4" id="questionText"></h3>
                <div id="optionsContainer" class="space-y-3"></div>
            </div>

            <div class="flex gap-4">
                <button id="prevBtn" class="px-6 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition"
                    disabled>Previous</button>
                <button id="nextBtn"
                    class="flex-1 bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">Next</button>
                <button id="submitTestBtn"
                    class="hidden flex-1 bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition">Submit
                    Test</button>
            </div>
        </div>
    </div>

    <div id="resultsSection" class="hidden">
        <div class="bg-white p-8 rounded-lg shadow-lg max-w-3xl mx-auto">
            <h2 class="text-2xl font-bold mb-6 text-gray-800">Test Results</h2>

            <div class="grid md:grid-cols-3 gap-6 mb-8">
                <div class="bg-blue-50 p-6 rounded-lg text-center">
                    <p class="text-gray-600 mb-2">Score</p>
                    <p class="text-3xl font-bold text-blue-600" id="scoreValue"></p>
                </div>
                <div class="bg-green-50 p-6 rounded-lg text-center">
                    <p class="text-gray-600 mb-2">Correct</p>
                    <p class="text-3xl font-bold text-green-600" id="correctValue"></p>
                </div>
                <div class="bg-purple-50 p-6 rounded-lg text-center">
                    <p class="text-gray-600 mb-2">Performance</p>
                    <p class="text-xl font-bold text-purple-600" id="performanceLevel"></p>
                </div>
            </div>

            <div id="detailedResults" class="space-y-4 mb-6"></div>

            <button id="newTestBtn"
                class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition">Take Another
                Test</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/test.js"></script>
{% endblock %}
